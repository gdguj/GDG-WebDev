<!DOCTYPE html>
<html lang="en">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">


<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Game Results</title>
 <link rel="stylesheet" href="../CSS/game-results.css">
</head>

<body>

   <!-- ================= NAVBAR ================= -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

            <!-- Logo -->
            <img src="../Images/colorful-logo.png" alt="logo" class="h-10">

            <!-- Links -->
            <div class="hidden md:flex items-center gap-8 font-semibold text-gray-600">
                <a href="main page.html" class="hover:text-[#0078BF]">الرئيسية</a>
                <a href="main page.html#about" class="hover:text-[#0078BF]">من نحن</a>
                <a href="main page.html#goals" class="hover:text-[#0078BF]">أهدافنا</a>
                <a href="main page.html#games" class="hover:text-[#0078BF]">الألعاب</a>
            </div>

        </div>
    </nav>

  <main class="page">
    <section class="card">

      <div class="content">

        <!-- LEFT SIDE -->
        <div class="left">
          <h1 class="heading">
            <span class="heading-label">Game Results:</span><br />
            <span class="congrats">
              <span class="c-blue">C</span><span class="c-red">o</span><span class="c-yellow">n</span><span class="c-green">g</span><span class="c-blue">r</span><span class="c-red">a</span><span class="c-yellow">t</span><span class="c-green">u</span><span class="c-blue">l</span><span class="c-red">a</span><span class="c-yellow">t</span><span class="c-green">i</span><span class="c-blue">o</span><span class="c-red">n</span><span class="c-yellow">s</span><span class="c-green">!</span>
            </span>
          </h1>

          <div class="winner-row">
            <span class="trophy">🏆</span>
            <span class="winner-text">Winner:</span>
            <span class="winner-name">Goats</span>

            <select class="team-members">
              <option selected>Team Members</option>
              <option>User1</option>
              <option>User2</option>
            </select>
          </div>

          <div class="score-line">
            Score: <span class="score-num">24</span> Points
          </div>

          <hr class="divider" />

          <div class="stats-title">
            <span>ⓘ</span>
            <span>Match Statistics</span>
          </div>

          <ul class="stats">
            <li>Total Words Found: <strong>10</strong></li>
            <li>Longest Word: “SaudiArabia” (Goats)</li>
            <li>Highest Streak: <strong>4</strong> (Goats)</li>
            <li>Fastest Answer: <strong>2.8s</strong> (Green Team)</li>
          </ul>
        </div>

        <!-- RIGHT SIDE -->
        <div class="right">
          <div class="mini-map">
            <img src="../images/minimap.png" alt="Final board" />
          </div>

          <div class="score-pill">
            <div class="pill pill-blue">
              <span>Goats</span>
              <span>6</span>
            </div>

            <div class="divider-vertical"></div>

            <div class="pill pill-green">
              <span>Green team</span>
              <span>4</span>
            </div>
          </div>
        </div>

      </div>

      <!-- Buttons Row -->
      <div class="buttons-row">
        <button class="btn primary">Play Again</button>
        <button class="btn outline">Back to Home</button>
      </div>

      <!-- Bottom Pattern -->
      <div class="pattern"></div>

    </section>
  </main>
</body>
</html>
