<body>

 <!-- ================= NAVBAR ================= -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

            <!-- Logo -->
            <img src="../Images/colorful-logo.png" alt="logo" class="h-10">

            <!-- Links -->
            <div class="hidden md:flex items-center gap-8 font-semibold text-gray-600">
                <a href="main page.html" class="hover:text-[#0078BF]">الرئيسية</a>
                <a href="main page.html#about" class="hover:text-[#0078BF]">من نحن</a>

                <a href="main page.html#games" class="hover:text-[#0078BF]">الألعاب</a>
            </div>

        </div>

  <main class="frame">
    <div class="panel">
      <img src="../images/Top Strip.png" class="strip">

      <h1 class="title">Choose Difficulty</h1>

      <section class="team-names" aria-label="Team names">
        <label class="team-name-field" for="teamANameInput">
          Team 1 Name
          <input id="teamANameInput" type="text" maxlength="20" placeholder="Enter first team name" />
        </label>
        <label class="team-name-field" for="teamBNameInput">
          Team 2 Name
          <input id="teamBNameInput" type="text" maxlength="20" placeholder="Enter second team name" />
        </label>
      </section>

      <section class="cards">
        <button class="difficulty-card easy" type="button" data-difficulty="easy">
          <div class="card-top">Easy</div>
          <div class="card-body">
            <img class="icon" src="../images/EasyIcon.png" alt="">
          </div>
        </button>

        <button class="difficulty-card medium" type="button" data-difficulty="medium">
          <div class="card-top">Medium</div>
          <div class="card-body">
            <img class="icon" src="../images/MediumIcon.png" alt="">
          </div>
        </button>

        <button class="difficulty-card hard" type="button" data-difficulty="hard">
          <div class="card-top">Hard</div>
          <div class="card-body">
            <img class="icon" src="../images/HardIcon.png" alt="">
          </div>
        </button>
      </section>

      <button class="start-btn" id="startBtn" disabled>Start the Game</button>
    </div>
  </main>

      <!-- ================= FOOTER ================= -->
    <footer class="bg-[#403F41] text-gray-300 py-12 px-6">

                <img src="../Images/white-logo.png" class="w-65 h-auto mb-4 object-contain">

                    الحلول.

            </div>

            <!-- Links -->
            <div>

                <ul class="space-y-2 text-sm">
                    <li><a href="main page.html">الرئيسية</a></li>
                    <li><a href="main page.html#about">من نحن</a></li>
                    <li><a href="main page.html#goals">أهدافنا</a></li>

            </div>

            <!-- Contact -->

            جميع الحقوق محفوظة © 2026 مجموعة مطوري قوقل
