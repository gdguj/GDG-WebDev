<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شخصية قوقل - بحجم كبير</title>
    <link rel="stylesheet" href="../CSS/FamilyFeud-SurveyLanding.css">
</head>
<body>
    <div class="page-wrapper">
        <img src="../images/Top Strip.png" class="strip-top" alt="Top Strip">

        <!-- المحتوى الرئيسي -->
        <div class="content-area">
            <div class="character-container">
                <!-- شخصية قوقل -->
                <img src="../images/google-character-transbarate.png" class="character" alt="Google Character">

                <!-- مربع النص  -->
                <div class="speech-bubble">
                    <h2 class="google-title">
                    <span class="g">G</span>
                    <span class="a">a</span>
                    <span class="m">m</span>
                    <span class="e">e</span>
                    <span class="space"> </span>
                    <span class="n1">n</span>
                    <span class="s1">s</span>
                    <span class="t1">t</span>
                    <span class="r1">r</span>
                    <span class="u1">u</span>
                    <span class="c1">c</span>
                    <span class="t2">t</span>
                    <span class="i2">i</span>
                    <span class="o1">o</span>
                    <span class="n2">n</span>
                    <span class="s2">s</span>
                    <span class="colon">:</span>
                    </h2>
                    
                    <p>👋 Hey! Here's how to play:</p>

                    <ul class="rules-list">
                        <li>
                            <span class="rule-icon">①</span>
                            <span><span class="highlight">3-try limit</span> per question</span>
                        </li>
                        <li>
                            <span class="rule-icon">⚡</span>
                            <span>
                                <strong>Point-stealing mechanic</strong>
                                <span class="steal-badge">STEAL</span>
                            </span>
                        </li>
                        <li>
                            <span class="rule-icon">💰</span>
                            <span>After 3 wrong answers, opponent can <strong>steal all points</strong> with one correct answer</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <img src="../images/Top Strip.png" class="strip-bottom" alt="Bottom Strip">
    </div>
</body>
</html>
