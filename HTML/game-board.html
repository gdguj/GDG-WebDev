<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hex Game Board</title>
  <link rel="stylesheet" href="../CSS/game-board.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div id="game-container">

<nav id="navbar">
    <div class="nav-timer">
    <div class ="timer-header">
        <span class="nav-label">Time Remaining</span>
        <span class="hourglass"><svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
            fill="currentColor" viewBox="0 0 24 24" >
            <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
            <path d="M5 2H4v2h1v1c0 2.46 1.32 4.77 3.43 6.02.35.21.57.55.57.9v.16c0 .35-.21.69-.57.9A7.01 7.01 0 0 0 5 19v1H4v2h16v-2h-1v-1c0-2.46-1.32-4.77-3.43-6.02-.36-.21-.57-.55-.57-.9v-.16c0-.35.21-.69.57-.9A7.01 7.01 0 0 0 19 5V4h1V2zm12 3c0 1.76-.94 3.41-2.45 4.3-.97.57-1.55 1.55-1.55 2.62v.16c0 1.07.58 2.05 1.55 2.62 1.51.89 2.45 2.54 2.45 4.3v1H7v-1c0-1.76.94-3.41 2.45-4.3.97-.57 1.55-1.55 1.55-2.62v-.16c0-1.07-.58-2.05-1.55-2.62A5.01 5.01 0 0 1 7 5V4h10z"></path>
            </svg>
        </span>
    </div>
     
      <div class="timer-track">
        <div class="timer-fill" id="timerFill"></div>
      </div>
    </div>
    <div class="nav-playing">
      Now Playing:
      <span id="currentTeamLabel">Blue Team</span>
    </div>
</nav>

  <canvas id="gameCanvas" width="500" height="500"></canvas>

  <div id="question-screen" class="hidden">
  <div id="question-letter" class="q-letter">H</div>
    <!-- يطلع وقت مانكون ننتظر السؤال من AI -->
  <div id="loading-spinner" class="spinner hidden"></div>
  <p id="question-text" class="q-text">Loading...</p>
  <div class="answer-row">
      <input
        type="text"
        id="answer-input"
        class="answer-input"
        placeholder="Type your answer..."
      />
      <div id="check-icon" class="check-icon hidden"><svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
        fill="currentColor" viewBox="0 0 24 24" >
        <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
        <path d="m20.42 6.11-7.97-4c-.28-.14-.62-.14-.9 0l-7.97 4c-.31.15-.51.45-.55.79-.01.11-.96 10.76 8.55 15.01a.98.98 0 0 0 .82 0C21.91 17.66 20.97 7 20.95 6.9a.98.98 0 0 0-.55-.79ZM12 19.9C5.26 16.63 4.94 9.64 5 7.64l7-3.51 7 3.51c.04 1.99-.33 9.02-7 12.26"></path><path d="m11 12.59-1.29-1.3-1.42 1.42 2.71 2.7 4.71-4.7-1.42-1.42z"></path>
        </svg>
      </div>
  </div>

    <button id="submit-btn" class="submit-btn" onclick="submitAnswer()">Submit</button>

    <!-- الانيمشين حق النقاط-->
    <div id="points-popup" class="points-popup hidden">
      + 4 Points
    </div>

  </div>

   <div id="score-bar">

    <!-- الفريق الأزرق -->
    <div class="team-pill blue">
      <span class="team-pill-name" id="team-blue-name">Goats</span>
      <span class="team-pill-num" id="team-blue-words">4</span>
      <span class="team-pill-divider"></span>
      <span class="team-pill-num" id="team-blue-pts">16</span>
    </div>

    <!-- الفريق الأخضر -->
    <div class="team-pill green">
      <span class="team-pill-name" id="team-green-name">Team name</span>
      <span class="team-pill-num" id="team-green-words">2</span>
      <span class="team-pill-divider"></span>
      <span class="team-pill-num" id="team-green-pts">8</span>
    </div>

  </div>
</div> 

  <script src="../JS/game-board.js"></script>
</body>
</html>
